<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LBO Model</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/J.png">

  <!-- Styles -->
  <link rel="stylesheet" href="styles/styles.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="navbar">
  <div class="nav-left">
    <img src="assets/J.png" alt="Logo" class="logo">
    <h1 class="brand-title">LBO Model</h1>
  </div>
</header>

<main class="container">

  <section class="card">
    <h2>Inputs</h2>

    <label>Revenue</label>
    <input type="number" id="revenue" value="1000000">

    <label>Growth Rate (%)</label>
    <input type="number" id="growth" value="5">

    <label>Exit Multiple</label>
    <input type="number" id="multiple" value="8">
  </section>

  <section class="card">
    <h2>Outputs</h2>
    <p>Projected Value: <span id="outputValue">$0</span></p>
  </section>

  <section class="card">
    <canvas id="chart"></canvas>
  </section>

</main>

<script src="scripts/app.js"></script>
</body>
</html>
